<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeMovieWatchers - Login</title>
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="logo">FreeMovieWatchers</h1>
            <p class="subtitle">Sign in to your account</p>

            <!-- Google Login Button -->
            <button class="oauth-button google-button" id="googleLoginBtn">
                <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Sign in with Google</span>
            </button>

            <!-- Apple Login Button -->
            <button class="oauth-button apple-button" id="appleLoginBtn">
                <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M17.05 13.5c-.91 2.18.18 4.32 2.21 4.47 1.96.15 3.32-1.66 3.32-4.47 0-3.46-2.49-5.23-4.99-5.23-2.64 0-5.09 1.99-5.09 5.09 0 3.33 2.36 5.05 5.09 5.05 1.74 0 2.95-.89 3.4-1.64h2.58c-.58 1.35-2.04 2.74-5.98 2.74-4.15 0-7.61-2.57-7.61-7.61 0-5.06 3.46-7.61 7.61-7.61 5.48 0 7.61 4.18 7.61 7.61v1.6h-7.15zm-.65-2.56h4.58c-.17-1.22-1.19-2.27-2.29-2.27-1.1 0-2.12 1.05-2.29 2.27z"/>
                </svg>
                <span>Sign in with Apple</span>
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <!-- Email Login Form -->
            <form id="emailLoginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="login-button">Sign In</button>
            </form>

            <div class="footer-links">
                <a href="#forgot-password">Forgot password?</a>
                <span class="divider-dot">•</span>
                <a href="#signup">Create account</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid.js"></script>
    <script src="scripts/login.js"></script>
</body>
</html>
